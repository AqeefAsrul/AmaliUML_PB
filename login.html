<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Masuk Sistem Kokurikulum</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <h2>Sistem Pendaftaran Aktiviti Kelab Kolej </h2>
        <h1>Log Masuk</h1>
        <form>
            <div class="input-group"> 
                <label for="peranan">Jenis Pengguna</label>
                <select id="peranan" name="peranan" required>
                    <option value="" disabled selected>--Sila Pilih--</option>
                    <option value="pelajar">Pelajar</option>
                    <option value="pensyarah">Pensyarah/Guru Penyelaras</option>
                    <option value="pentadbir">Pentadbir Sistem</option>
                </select>
            </div>
            <div class="input-group">
                <label for="username">ID Pengguna</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="input-group">
                <label for="password">Kata Laluan</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="remember-me">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">Ingat saya</label>
            </div>
            <button type="submit" class="login-button">Log Masuk</button>
        </form>
        <p class="forgot-password"><a href="#">Lupa kata laluan?</a></p>
    </div>
</body>
</html>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.login-container {
    background-color: #ffffff;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    width: 350px;
    text-align: center;
}

.login-container h2 {
    font-size: 18px;
    color: #555;
    margin-bottom: 5px;
}

.login-container h1 {
    font-size: 28px;
    color: #333;
    margin-top: 0;
    margin-bottom: 25px;
}

.input-group {
    margin-bottom: 20px;
    text-align: left;
}

.input-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: bold;
    color: #666;
}

.input-group input {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 5px;
    box-sizing: border-box; /* Ensures padding doesn't affect the width */
    font-size: 16px;
}

.remember-me {
    text-align: left;
    margin-bottom: 20px;
    color: #666;
}

.remember-me input {
    margin-right: 8px;
}

.login-button {
    width: 100%;
    padding: 12px;
    background-color: #007bff;
    color: #fff;
    border: none;
    border-radius: 5px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: background-color 0.3s ease;
}

.login-button:hover {
    background-color: #0056b3;
}

.forgot-password {
    margin-top: 20px;
    font-size: 14px;
}

.forgot-password a {
    color: #007bff;
    text-decoration: none;
}

.forgot-password a:hover {
    text-decoration: underline;
}
.input-group select {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 5px;
    box-sizing: border-box; /* Ensures padding doesn't affect the width */
    font-size: 16px;
}

</style>
